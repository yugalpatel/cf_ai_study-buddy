<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Study Buddy</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e8e6e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 32px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #1a1a24;
      border: 1px solid #2a2a38;
      border-radius: 16px;
      padding: 24px;
    }

    .card h2 {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b7280;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      background: #0f0f13;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      color: #e8e6e0;
      font-size: 14px;
      padding: 12px;
      resize: vertical;
      min-height: 100px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.2s;
    }

    textarea:focus { border-color: #a78bfa; }

    button {
      background: linear-gradient(135deg, #7c3aed, #3b82f6);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .flashcards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 4px;
    }

    .flashcard {
      background: #0f0f13;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      padding: 14px;
      cursor: pointer;
      transition: border-color 0.2s;
    }

    .flashcard:hover { border-color: #a78bfa; }

    .flashcard .q {
      font-size: 13px;
      font-weight: 600;
      color: #a78bfa;
      margin-bottom: 6px;
    }

    .flashcard .a {
      font-size: 13px;
      color: #9ca3af;
      display: none;
    }

    .flashcard.revealed .a { display: block; }
    .flashcard .hint { font-size: 11px; color: #4b5563; margin-top: 6px; }

    .chat-messages {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 320px;
      overflow-y: auto;
      margin-bottom: 14px;
      padding-right: 4px;
    }

    .msg {
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .msg.user { flex-direction: row-reverse; }

    .msg .bubble {
      background: #2a2a38;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      max-width: 85%;
      line-height: 1.5;
    }

    .msg.user .bubble {
      background: linear-gradient(135deg, #7c3aed55, #3b82f655);
      border: 1px solid #7c3aed44;
    }

    .msg .avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      flex-shrink: 0;
      background: #2a2a38;
    }

    .chat-input-row {
      display: flex;
      gap: 10px;
    }

    .chat-input-row input {
      flex: 1;
      background: #0f0f13;
      border: 1px solid #2a2a38;
      border-radius: 10px;
      color: #e8e6e0;
      font-size: 14px;
      padding: 10px 14px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .chat-input-row input:focus { border-color: #a78bfa; }

    .chat-input-row button { margin-top: 0; padding: 10px 16px; }

    .score-bar {
      background: #0f0f13;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #9ca3af;
      display: flex;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .score-bar span { color: #a78bfa; font-weight: 600; }

    .empty-state {
      text-align: center;
      color: #4b5563;
      font-size: 13px;
      padding: 20px 0;
    }

    .loading { color: #6b7280; font-style: italic; font-size: 13px; }
  </style>
</head>
<body>

<h1>AI Study Buddy</h1>
<p class="subtitle">Paste your notes → get flashcards → quiz yourself</p>

<div class="container">

  <!-- Step 1: Generate -->
  <div class="card">
    <h2>1 — Paste your notes</h2>
    <textarea id="notes-input" placeholder="Paste any text here — lecture notes, an article, a paragraph..."></textarea>
    <button id="generate-btn" onclick="generateCards()">Generate Flashcards</button>
  </div>

  <!-- Step 2: Flashcards -->
  <div class="card">
    <h2>2 — Your flashcards <span style="color:#4b5563;font-weight:400;text-transform:none;letter-spacing:0">(click to reveal answer)</span></h2>
    <div class="flashcards-grid" id="flashcards-grid">
      <div class="empty-state" style="grid-column:1/-1">No flashcards yet — generate some above!</div>
    </div>
    <button id="quiz-btn" onclick="startQuiz()" style="display:none">Start Quiz →</button>
  </div>

  <!-- Step 3: Quiz -->
  <div class="card">
    <h2>3 — Quiz yourself</h2>
    <div class="score-bar">
      <span id="quiz-status">Generate flashcards to begin</span>
      <span id="score-display"></span>
    </div>
    <div class="chat-messages" id="chat-messages">
      <div class="empty-state">Your quiz chat will appear here</div>
    </div>
    <div class="chat-input-row">
      <input type="text" id="chat-input" placeholder="Type your answer..." onkeydown="if(event.key==='Enter') sendAnswer()" disabled/>
      <button onclick="sendAnswer()" id="send-btn" disabled>Send</button>
    </div>
  </div>

</div>

<script>
  const WORKER_URL = 'https://cf-ai-study-buddy.yugalpatel9330.workers.dev';
  const SESSION_ID = 'session_' + Math.random().toString(36).slice(2, 9);
  let cards = [];
  let currentCardIndex = 0;
  let score = 0;

  async function generateCards() {
    const text = document.getElementById('notes-input').value.trim();
    if (!text) return alert('Please paste some notes first!');

    const btn = document.getElementById('generate-btn');
    btn.disabled = true;
    btn.textContent = 'Generating...';

    const grid = document.getElementById('flashcards-grid');
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">🤖 Asking Llama 3.3 to generate flashcards...</div>';

    try {
      const res = await fetch(`${WORKER_URL}/generate`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text, sessionId: SESSION_ID }),
      });
      const data = await res.json();
      cards = data.cards;
      renderCards();
      document.getElementById('quiz-btn').style.display = 'block';
    } catch (e) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;color:#f87171">Error generating cards. Is the Worker running?</div>';
    }

    btn.disabled = false;
    btn.textContent = 'Generate Flashcards';
  }

  function renderCards() {
    const grid = document.getElementById('flashcards-grid');
    grid.innerHTML = cards.map((c, i) => `
      <div class="flashcard" onclick="this.classList.toggle('revealed')" id="card-${i}">
        <div class="q">Q${i+1}: ${c.question}</div>
        <div class="a">✅ ${c.answer}</div>
        <div class="hint">Click to reveal answer</div>
      </div>
    `).join('');
  }

  function startQuiz() {
    currentCardIndex = 0;
    score = 0;
    document.getElementById('chat-messages').innerHTML = '';
    document.getElementById('chat-input').disabled = false;
    document.getElementById('send-btn').disabled = false;
    document.getElementById('score-display').textContent = `Score: 0 / ${cards.length}`;
    document.getElementById('quiz-status').textContent = `Question 1 of ${cards.length}`;
    addMessage('bot', `Let's go! Here's question 1 of ${cards.length}:\n\n${cards[0].question}`);
    document.getElementById('chat-input').focus();
  }

  async function sendAnswer() {
    const input = document.getElementById('chat-input');
    const answer = input.value.trim();
    if (!answer || currentCardIndex >= cards.length) return;

    addMessage('user', answer);
    input.value = '';
    input.disabled = true;
    document.getElementById('send-btn').disabled = true;

    const thinking = addMessage('bot', '⏳ Evaluating your answer...');

    try {
      const res = await fetch(`${WORKER_URL}/quiz`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          sessionId: SESSION_ID,
          message: answer,
          cardIndex: currentCardIndex,
        }),
      });
      const data = await res.json();

      thinking.querySelector('.bubble').textContent = data.reply;
      score = data.score;
      currentCardIndex = data.nextCardIndex ?? cards.length;

      document.getElementById('score-display').textContent = `Score: ${score} / ${cards.length}`;

      if (data.done) {
        document.getElementById('quiz-status').textContent = 'Quiz complete!';
        input.disabled = true;
        document.getElementById('send-btn').disabled = true;
      } else {
        document.getElementById('quiz-status').textContent = `Question ${currentCardIndex + 1} of ${cards.length}`;
        input.disabled = false;
        document.getElementById('send-btn').disabled = false;
        input.focus();
      }
    } catch (e) {
      thinking.querySelector('.bubble').textContent = 'Error contacting the Worker. Is it still running?';
      input.disabled = false;
      document.getElementById('send-btn').disabled = false;
    }
  }

  function addMessage(role, text) {
    const container = document.getElementById('chat-messages');
    const div = document.createElement('div');
    div.className = `msg ${role === 'user' ? 'user' : ''}`;
    div.innerHTML = `
      <div class="avatar">${role === 'user' ? '🧑' : '🤖'}</div>
      <div class="bubble">${text}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
  }
</script>

</body>
</html>
